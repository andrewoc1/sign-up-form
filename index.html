<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <div class="sidebar-container">
        <figure>
          <img
            src="skiImg.jpg"
            alt="Picture of skier jumping and crossing skis"
          />
          <h3>SkiWrld⛷</h3>
          <figcaption>
            Photo by
            <a
              href="https://unsplash.com/@mattpunsplash?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
              >Matthieu Pétiard</a
            >
            on
            <a
              href="https://unsplash.com/photos/skier-jumping-over-snowy-slope-Pf6e3o0GL4M?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
              >Unsplash</a
            >
          </figcaption>
        </figure>
      </div>

      <div class="form-container">
        <h2>Create an account to ski at the top of the mountain!</h2>
        <form action="#" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label for="first_name">First Name</label>
              <input type="text" name="first_name" id="first_name" required />
            </div>
            <div class="form-group">
              <label for="last_name">Last Name</label>
              <input type="text" name="last_name" id="last_name" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" name="email" id="email" required />
            </div>
            <div class="form-group">
              <label for="phone_number">Phone Number</label>
              <input
                type="tel"
                name="phone_number"
                id="phone_number"
                required
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                name="password"
                id="password"
                minlength="8"
                maxlength="20"
                required
              />
            </div>
            <div class="form-group">
              <label for="confirm-password">Confirm Password</label>
              <input
                type="password"
                name="confirm-password"
                id="confirm-password"
                minlength="8"
                maxlength="20"
                required
              />
            </div>
          </div>

          <button type="submit">Create Account</button>

          <h6>Already have an account? <a href="#">Log In</a></h6>
        </form>
      </div>
    </div>
  </body>
</html>
